id: tc.session
title: セッション／Cookie と書き込み境界
description: 投稿・返信・削除はログイン後のみ。Workers 側で検証。**セッション状態の単一正本**（Neon のみとするか KV
  併用か等）は **S1 スパイク結果に合わせ orchestration に文書化**する。
dependsOn:
  - tc.authgate
  - tc.hono
allowedPaths:
  - apps/api
acceptanceCriteria:
  - 書き込み API が未認証で拒否される。
  - セッション状態の単一正本（Neon のみ／KV 併用等）が orchestration に記載される。
status: queued
retryCount: 0
maxRunRetries: 1
maxReviewRetries: 1
