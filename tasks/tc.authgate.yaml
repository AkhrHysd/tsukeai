id: tc.authgate
title: Passkey（S1）の orchestration 同期と SimpleWebAuthn スパイク
description: Design で確定した S1（@simplewebauthn/server on Hono Workers、Neon
  にクレデンシャル／セッション、httpOnly Cookie、パスワードなし）を docs/orchestration に同期し、Workers
  上でのライブラリ適合をスパイクして記録する。
dependsOn:
  - tc.shared
allowedPaths:
  - docs/orchestration
acceptanceCriteria:
  - S1 パスキー方針とスパイク結果が orchestration 文書に記録される。
  - RP ID・公開 URL・Cookie ドメイン・CORS の対応が orchestration に記載される。
  - MVP におけるメール検証の要否（採用／不採用／将来）が orchestration に明文化される。
  - SimpleWebAuthn on Workers のスパイク結果と代替方針が orchestration に記載される。
status: queued
retryCount: 0
maxRunRetries: 1
maxReviewRetries: 1
