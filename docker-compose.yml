services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: tanka
      POSTGRES_USER: tanka
      POSTGRES_PASSWORD: tanka
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tanka -d tanka"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
